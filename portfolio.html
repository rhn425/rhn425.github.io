  <style>
    .container {
      text-align: center;
    }

    .circle-frame {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      overflow: hidden;
      margin: 150px auto 0; /* Adjust margin as needed */
    }

    .circle-frame img {
      width: 100%;
      height: auto;
    }

    h3 {
      font-size: 35px; /* Adjust font size for h3 */
    }

    .typing {
      overflow: hidden;
      white-space: nowrap;
      font-size: 35px; /* Adjust font size for typing text */
      border-right: .15em solid orange; /* Typewriter cursor */
      animation: typing 4s steps(40, end), blink-caret .75s step-end infinite;
    }

    @keyframes typing {
      from { width: 0; }
      to { width: 100%; }
    }

    @keyframes blink-caret {
      from, to { border-color: transparent; }
      50% { border-color: orange; }
    }
    
    /* Add spacing between videos */
    .video-container {
      margin-bottom: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      position: relative;
      padding-top: 100%; /* 1:1 Aspect Ratio (square) */
      cursor: pointer;
    }
    
    /* Make video player 1:1 px */
    .video-container video {
      max-width: 100%;
      max-height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    
    /* Style for video popup */
    .video-popup {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 70%;
      max-width: 800px;
      height: auto;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.8);
      overflow: auto;
      text-align: center;
    }
    
    .video-popup video {
      width: 100%;
      height: auto;
    }
    
    /* Play button style */
    .play-button {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background-color: rgba(255, 255, 255, 0.8);
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
    }
    
    .play-button i {
      font-size: 30px;
      color: #333;
    }
    
    /* Navigation arrows */
    .nav-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 40px;
      height: 40px;
      background-color: rgba(255, 255, 255, 0.5);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      z-index: 1001;
    }
    
    .nav-arrow i {
      font-size: 20px;
      color: #333;
    }
    
    .nav-arrow.left {
      left: 10px;
    }
    
    .nav-arrow.right {
      right: 10px;
    }
  </style>

<!-- Navigation Arrows -->
<div class="nav-arrow left" onclick="prevVideo()"><i class="fa fa-chevron-left"></i></div>
<div class="nav-arrow right" onclick="nextVideo()"><i class="fa fa-chevron-right"></i></div>

<script>
  // Autoplay videos as previews
  var videos = document.querySelectorAll('.video-container video');
  videos.forEach(function(video) {
    video.muted = true;
    video.play();
    setTimeout(function() {
      video.pause();
    }, 5000);
  });

  // Show pop-out video
  function showVideo(src) {
    var videoPopup = document.querySelector('.video-popup');
    var popupVideo = videoPopup.querySelector('video');
    popupVideo.src = src;
    videoPopup.style.display = 'block';
    popupVideo.play();
    popupVideo.loop = true;
  }

  // Close pop-out video
  document.querySelector('.video-popup').addEventListener('click', function() {
    var popupVideo = this.querySelector('video');
    popupVideo.pause();
    this.style.display = 'none';
  });

  // Navigation arrows
  var currentVideoIndex = 0;
  var videoSources = [
    'assets/video1.mp4',
    'assets/video2.mp4',
    'assets/video3.mp4',
    'assets/video4.mp4',
    'assets/video5.mp4',
    'assets/video6.mp4',
    'assets/video7.mp4',
    'assets/video8.mp4',
    'assets/video9.mp4'
  ];

  function nextVideo() {
    currentVideoIndex = (currentVideoIndex + 1) % videoSources.length;
    showVideo(videoSources[currentVideoIndex]);
  }

  function prevVideo() {
    currentVideoIndex = (currentVideoIndex - 1 + videoSources.length) % videoSources.length;
    showVideo(videoSources[currentVideoIndex]);
  }
</script>
