    .typing {
      overflow: hidden;
      white-space: nowrap;
      font-size: 35px; /* Adjust font size for typing text */
      border-right: .15em solid orange; /* Typewriter cursor */
      animation: typing 4s steps(40, end), blink-caret .75s step-end infinite;
    }

    @keyframes typing {
      from { width: 0; }
      to { width: 100%; }
    }

    @keyframes blink-caret {
      from, to { border-color: transparent; }
      50% { border-color: orange; }

  <script>
    const roles = ["Rhen","Graphics Designer", "Video Editor"];
    let index = 0;
    const typingElement = document.querySelector('.typing');

    function typeRole() {
      typingElement.textContent = ''; // Clear previous content
      const role = roles[index];
      let charIndex = 0;
      const typingInterval = setInterval(function() {
        if (charIndex < role.length) {
          typingElement.textContent += role.charAt(charIndex);
          charIndex++;
        } else {
          clearInterval(typingInterval);
          setTimeout(typeRole, 2000); // Wait 2 seconds before typing the next role
        }
      }, 100); // Typing speed: 100 milliseconds per character
      index = (index + 1) % roles.length; // Loop through roles
    }

    typeRole(); // Start typing the roles
  </script>
